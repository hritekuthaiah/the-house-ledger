/* ---------- DEALER & BLINDS ROTATION (per-device, persists in localStorage) ---------- */
function renderDealerPanel(host, players, sid){
  host.innerHTML='';
  if(players.length<2){
    host.append(el(`<div class="empty" style="padding:14px">Seat at least 2 players to track the dealer button.</div>`));
    return;
  }
  const n=players.length, key='poker_dealer_'+sid;
  let d=parseInt(localStorage.getItem(key)||'0',10); if(isNaN(d))d=0; d=((d%n)+n)%n;
  const heads=(n===2);
  const sb = heads ? d : (d+1)%n;
  const bb = heads ? (d+1)%n : (d+2)%n;
  const seats=el(`<div class="seats"></div>`);
  players.forEach((p,i)=>{
    const badges=[];
    if(i===d) badges.push('<span class="bdg d">D</span>');
    if(i===sb) badges.push('<span class="bdg sb">SB</span>');
    if(i===bb) badges.push('<span class="bdg bb">BB</span>');
    const seat=el(`<button class="seat ${i===d?'isd':''}" title="Set ${esc(p.name)} as dealer">
      <span class="seat-name">${esc(p.name)}</span>
      <span class="seat-badges">${badges.join('')}</span>
    </button>`);
    seat.onclick=()=>{ localStorage.setItem(key,String(i)); renderDealerPanel(host,players,sid); };
    seats.append(seat);
  });
  host.append(seats);
  const ctrl=el(`<div class="dealer-ctrl">
    <span class="dealer-hint">Tap a player to set the dealer · <b>D</b> dealer · <b>SB</b>/<b>BB</b> blinds</span>
    <button class="btn sm" id="nextHand">Next hand →</button>
  </div>`);
  ctrl.querySelector('#nextHand').onclick=()=>{ localStorage.setItem(key,String((d+1)%n)); renderDealerPanel(host,players,sid); };
  host.append(ctrl);
}

/* ---------- WHATSAPP SETTLEMENT SUMMARY ---------- */
function settlementText(s, sortedNets, transfers, totalBuyin, balanced){
  const L=[];
  L.push('🃏 '+s.name+' — Settlement');
  L.push(fmtDate(s.created_at));
  L.push('');
  L.push('Net result:');
  sortedNets.forEach(r=>L.push('• '+r.name+'  '+signMoney(r.net)));
  L.push('');
  if(transfers.length){
    L.push('Settle up:');
    transfers.forEach(t=>L.push('• '+t.from+' → '+t.to+'  '+money(t.amt)+(t.toUpi?'  ('+t.toUpi+')':'')));
  } else {
    L.push(totalBuyin>0 ? '✅ All square — nobody owes anything.' : 'No buy-ins recorded yet.');
  }
  if(!balanced && totalBuyin>0) L.push('\n⚠️ Provisional — chips still being counted.');
  L.push('');
  L.push('Tracked on The House Ledger');
  return L.join('\n');
}

/* ---------- DOWNLOADABLE SETTLEMENT REPORT (PDF) ----------
   Full, everyone-can-verify breakdown: per-player buy-in/cash-out/net, the
   complete who-pays-whom, and a plain-English note on how it's derived. Builds
   a real one-tap PDF via jsPDF; if the lib didn't load, opens a print window. */
function downloadReport(s, rows, transfers, totalBuyin, totalCashout, balanced){
  const rs=(n)=>'Rs '+Number(n||0).toLocaleString('en-IN',{maximumFractionDigits:2});
  const rsSign=(n)=>(n>0?'+':n<0?'-':'')+rs(Math.abs(Number(n||0)));
  const sorted=[...rows].sort((a,b)=>b.net-a.net);
  const onTable=round2(totalBuyin-totalCashout);
  const statusLabel = s.status==='settled'?'Settled':s.status==='ended'?'Settling':'In progress';
  const gen=new Date().toLocaleString('en-IN',{dateStyle:'medium',timeStyle:'short'});
  const calcNote="Each player's net is the chips they cashed out minus the money they bought in. A negative net means they owe; a positive net means they're owed. To settle, the app repeatedly matches the biggest debtor with the biggest creditor — this clears everyone in the fewest possible payments. Since every rupee bought in is cashed out by someone, all nets add up to zero, so the payments below balance exactly.";
  const lib = window.jspdf && window.jspdf.jsPDF;
  if(!lib){ printReportFallback(s,sorted,transfers,totalBuyin,totalCashout,balanced,statusLabel,gen); return; }

  const doc=new lib({unit:'pt',format:'a4'});
  let y=56; const left=56, rightX=539;
  const line=()=>{ doc.setDrawColor(205); doc.line(left,y,rightX,y); };
  const nl=(h)=>{ y+=(h==null?16:h); if(y>790){ doc.addPage(); y=56; } };

  doc.setFont('helvetica','bold'); doc.setFontSize(20); doc.setTextColor(20); doc.text('The House Ledger', left, y);
  nl(20); doc.setFont('helvetica','normal'); doc.setFontSize(12); doc.setTextColor(90); doc.text('Settlement Report', left, y);
  nl(22); doc.setFontSize(10); doc.text(String(s.name)+'   .   '+fmtDate(s.created_at)+'   .   Table '+s.code+'   .   '+statusLabel, left, y);
  nl(10); line(); nl(24);

  // per-player table
  doc.setFont('helvetica','bold'); doc.setFontSize(10); doc.setTextColor(20);
  doc.text('Player', left, y); doc.text('Buy-in',320,y,{align:'right'}); doc.text('Cash-out',430,y,{align:'right'}); doc.text('Net',rightX,y,{align:'right'});
  nl(7); line(); nl(18); doc.setFont('helvetica','normal');
  sorted.forEach(r=>{
    doc.setTextColor(20); doc.text(String(r.name), left, y);
    doc.text(rs(r.buyin),320,y,{align:'right'});
    doc.text(r.cashedOut?rs(r.cashout):'-',430,y,{align:'right'});
    doc.setTextColor(r.net>EPS?20:(r.net<-EPS?176:120)); doc.text(rsSign(r.net),rightX,y,{align:'right'});
    nl(18);
  });
  nl(2); line(); nl(18);
  doc.setFont('helvetica','bold'); doc.setTextColor(20); doc.text('Totals', left, y);
  doc.text(rs(totalBuyin),320,y,{align:'right'}); doc.text(rs(totalCashout),430,y,{align:'right'});
  nl(15); doc.setFont('helvetica','normal'); doc.setFontSize(9); doc.setTextColor(90);
  doc.text(balanced?('Pot balanced - money in ('+rs(totalBuyin)+') equals chips out ('+rs(totalCashout)+').'):('Provisional - '+rs(onTable)+' in chips not yet counted.'), left, y);

  // settle-up
  nl(30); doc.setFont('helvetica','bold'); doc.setFontSize(12); doc.setTextColor(20); doc.text('Settle-up - fewest payments', left, y);
  nl(8); line(); nl(18); doc.setFont('helvetica','normal'); doc.setFontSize(10);
  if(!transfers.length){ doc.text('All square - nobody owes anything.', left, y); nl(); }
  else transfers.forEach(t=>{ doc.setTextColor(20); doc.text(String(t.from)+'  pays  '+String(t.to), left, y); doc.text(rs(t.amt),rightX,y,{align:'right'}); nl(18); });

  // how it's calculated
  nl(16); doc.setFont('helvetica','bold'); doc.setFontSize(12); doc.setTextColor(20); doc.text('How this was calculated', left, y);
  nl(8); line(); nl(16); doc.setFont('helvetica','normal'); doc.setFontSize(9.5); doc.setTextColor(70);
  doc.splitTextToSize(calcNote, rightX-left).forEach(ln=>{ doc.text(ln, left, y); nl(13); });

  nl(18); doc.setFontSize(8); doc.setTextColor(140);
  doc.text('Generated '+gen+'  .  Amounts in INR  .  The House Ledger', left, y);

  doc.save(String(s.name||'poker').replace(/[^a-z0-9]+/gi,'-').toLowerCase()+'-settlement.pdf');
}
function printReportFallback(s,sorted,transfers,totalBuyin,totalCashout,balanced,statusLabel,gen){
  const rs=(n)=>'₹'+Number(n||0).toLocaleString('en-IN',{maximumFractionDigits:2});
  const rsSign=(n)=>(n>0?'+':n<0?'−':'')+rs(Math.abs(Number(n||0)));
  const onTable=round2(totalBuyin-totalCashout);
  const rowsHtml=sorted.map(r=>`<tr><td>${esc(r.name)}</td><td class="r">${rs(r.buyin)}</td><td class="r">${r.cashedOut?rs(r.cashout):'—'}</td><td class="r">${rsSign(r.net)}</td></tr>`).join('');
  const tHtml=transfers.length?transfers.map(t=>`<tr><td>${esc(t.from)} pays ${esc(t.to)}</td><td class="r">${rs(t.amt)}</td></tr>`).join(''):'<tr><td colspan="2">All square — nobody owes anything.</td></tr>';
  const w=window.open('','_blank'); if(!w){ toast('Allow pop-ups to view the report'); return; }
  w.document.write(`<!doctype html><meta charset="utf-8"><title>Settlement Report</title>
  <style>body{font-family:system-ui,sans-serif;color:#222;max-width:680px;margin:30px auto;padding:0 18px}h1{margin:0;font-size:22px}h2{font-size:14px;margin:24px 0 6px;border-bottom:1px solid #ccc;padding-bottom:4px}.meta{color:#666;font-size:13px}table{width:100%;border-collapse:collapse;font-size:13px}td,th{padding:6px 4px;border-bottom:1px solid #eee;text-align:left}.r{text-align:right;font-variant-numeric:tabular-nums}.note{font-size:12px;color:#555;line-height:1.5}@media print{body{margin:0}}</style>
  <h1>The House Ledger</h1><div class="meta">Settlement Report · ${esc(s.name)} · ${fmtDate(s.created_at)} · Table ${esc(s.code)} · ${statusLabel}</div>
  <h2>Per player</h2><table><tr><th>Player</th><th class="r">Buy-in</th><th class="r">Cash-out</th><th class="r">Net</th></tr>${rowsHtml}
  <tr><td><b>Totals</b></td><td class="r"><b>${rs(totalBuyin)}</b></td><td class="r"><b>${rs(totalCashout)}</b></td><td class="r"></td></tr></table>
  <div class="meta" style="margin-top:6px">${balanced?`Pot balanced — money in (${rs(totalBuyin)}) equals chips out (${rs(totalCashout)}).`:`Provisional — ${rs(onTable)} in chips not yet counted.`}</div>
  <h2>Settle-up — fewest payments</h2><table>${tHtml}</table>
  <h2>How this was calculated</h2><p class="note">Each player's net is the chips they cashed out minus the money they bought in. A negative net means they owe; a positive net means they're owed. To settle, the app repeatedly matches the biggest debtor with the biggest creditor — clearing everyone in the fewest possible payments. Since every rupee bought in is cashed out by someone, all nets add up to zero, so the payments balance exactly.</p>
  <div class="meta" style="margin-top:20px">Generated ${gen} · Amounts in INR</div>
  <script>setTimeout(()=>window.print(),300)<\/script>`);
  w.document.close();
}

/* ---------- boot ---------- */
function bootFromHash(){
  const h=location.hash;
  if(h.startsWith('#t/')){ App.view='session'; App.sessionId=h.slice(3); }
  else if(h==='#history'){ App.view='history'; }
  else { App.view='lobby'; }
  render();
}
window.addEventListener('hashchange',()=>{
  if(SUPA_READY && !Auth.user) return;   // ignore routing while on the sign-in screen
  const h=location.hash;
  if(App.unsub){App.unsub();App.unsub=null;}
  if(h.startsWith('#t/')){App.view='session';App.sessionId=h.slice(3);}
  else if(h==='#history'){App.view='history';App.sessionId=null;}
  else {App.view='lobby';App.sessionId=null;}
  render();
});

/* ---------- auth + init ----------
   Local demo mode: no accounts, boot straight in (today's behavior).
   Cloud mode: require sign-in; the signed-in profile auto-fills name + UPI. */
const Auth = { user:null, profile:null };

async function loadProfile(){
  if(!Auth.user) return null;
  Auth.isNew=false;
  const { data } = await supa.from('profiles').select('*').eq('id',Auth.user.id).maybeSingle();
  if(data){ Auth.profile=data; }
  else {
    // brand-new account: seed a profile from the Google/email metadata and flag
    // it so first-sign-in onboarding runs even though the name auto-filled.
    Auth.isNew=true;
    const meta=Auth.user.user_metadata||{};
    const guessName=(meta.full_name||meta.name||(Auth.user.email||'').split('@')[0]||'Player').trim();
    const { data:created } = await supa.from('profiles').upsert({id:Auth.user.id,display_name:guessName}).select().single();
    Auth.profile=created||{id:Auth.user.id,display_name:guessName,upi_id:null};
  }
  // seed the per-device name (used for presence + the view-only name input) if unset
  if(Auth.profile && Auth.profile.display_name && !localStorage.getItem('poker_device_name')){
    localStorage.setItem('poker_device_name',Auth.profile.display_name);
  }
  return Auth.profile;
}

async function init(){
  if(!SUPA_READY){ bootFromHash(); return; }          // local demo: no auth gate
  const { data:{ session } } = await supa.auth.getSession();
  Auth.user = session ? session.user : null;
  supa.auth.onAuthStateChange(async (_e, sess)=>{
    const was = Auth.user && Auth.user.id;
    Auth.user = sess ? sess.user : null;
    const now = Auth.user && Auth.user.id;
    // Only react to an actual identity change (sign in / sign out). The
    // INITIAL_SESSION + token-refresh events fire for the SAME user and would
    // otherwise trigger a second concurrent render (e.g. "Recent Nights" twice).
    if(now===was) return;
    if(Auth.user){ await loadProfile(); bootFromHash(); if(Auth.isNew) openProfileModal(true); }
    else { Auth.profile=null; renderSignIn(); }
  });
  if(Auth.user){ await loadProfile(); bootFromHash(); if(Auth.isNew) openProfileModal(true); }
  else renderSignIn();
}
init();
